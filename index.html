<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAHEEM SPORTS ACADEMY</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.box{
    width:100%;
    max-width:430px;
    text-align:center;
}

.logo{
    width:170px;
    height:170px;
    object-fit:cover;
    border-radius:50%;
    margin-bottom:15px;
    box-shadow:0 0 20px rgba(255,204,0,.35);
}

h1{
    margin-bottom:25px;
    font-size:28px;
    color:#fff;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:18px;
    margin-bottom:15px;
    outline:none;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#ffcc00;
    color:#000;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#ffd633;
}

#result{
    display:none;
    margin-top:25px;
    background:#1d1d1d;
    border-radius:15px;
    padding:20px;
    text-align:right;
}

.player-img{
    width:170px;
    height:170px;
    object-fit:cover;
    border-radius:15px;
    display:block;
    margin:auto;
    margin-bottom:20px;
    border:4px solid #ffcc00;
}

#result h2{
    text-align:center;
    color:#ffcc00;
    margin-bottom:18px;
}

.info{
    margin:12px 0;
    font-size:18px;
}

.info span{
    color:#ffcc00;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<img src="IMG-20260608-WA0026(1).jpg" class="logo">

<h1>RAHEEM SPORTS ACADEMY</h1>

<input
id="code"
placeholder="اكتب كود اللاعب">

<button onclick="searchStudent()">
بحث
</button>

<div id="result"></div>

</div>

<script>

const students={
    "RA26O21-002":{
    name:"ميلا أبانوب محبوب",
    birth:"2021-06-06",
    nationalId:"32106062403165",
    image:"mila.jpg"
},

"RA26O16-010":{
    name:"ماريا أحمد فؤاد حلمي",
    birth:"2019-09-03",
    nationalId:"31909031403002",
    image:"maria.jpg"
},

"RA26O22-006":{
    name:"مليكة أحمد فؤاد حلمي",
    birth:"2022-03-25",
    nationalId:"32203252103643",
    image:"malika.jpg"
},

"RA26O19-015":{
    name:"كنزي مصطفى يسري يوسف",
    birth:"2019-11-07",
    nationalId:"31911070107369",
    image:"kenzy.jpg"
}

};

function calculateAge(birth){

let today=new Date();

let b=new Date(birth);

let age=today.getFullYear()-b.getFullYear();

let m=today.getMonth()-b.getMonth();

if(m<0||(m===0&&today.getDate()<b.getDate())){
age--;
}

return age;

}

function searchStudent(){

let code=document.getElementById("code").value.trim();

let result=document.getElementById("result");

result.style.display="block";

if(students[code]){

let player=students[code];

let age=calculateAge(player.birth);

result.innerHTML=`
<img src="${player.image}" class="player-img">

<h2>الملف الشخصي</h2>

<div class="info"><span>الكود:</span> ${code}</div>

<div class="info"><span>الاسم:</span> ${player.name}</div>

<div class="info"><span>تاريخ الميلاد:</span> ${player.birth}</div>

<div class="info"><span>العمر:</span> ${age} سنة</div>

<div class="info"><span>الرقم القومي:</span> ${player.nationalId}</div>
`;

}else{

result.innerHTML="<h2 style='color:red;text-align:center;'>❌ الكود غير موجود</h2>";

}
    }

</script>

</body>
</html>
